# Simple test configuration for webserv

server {
    listen 127.0.0.1:3000;
    server_name test.local;
    
    root ./www/html;
    index index.html;
    
    client_max_body_size 1048576;
    
    error_page 404 /error_pages/404.html;
    
    location / {
        allowed_methods GET POST;
        autoindex off;
    }
}
